name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # required to create the GitHub Release + upload .msi/latest.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history so annotated tag message is available

      - name: Extract release notes from tag
        id: notes
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          TYPE=$(git cat-file -t "$TAG" 2>/dev/null || echo "")
          MSG=""
          if [ "$TYPE" = "tag" ]; then
            # Annotated tag — extract the tag's own message (subject + body),
            # skipping any PGP signature blocks if present.
            MSG=$(git tag -l --format='%(contents:subject)%0a%0a%(contents:body)' "$TAG" | sed '/^-----BEGIN/,$d')
            MSG=$(echo "$MSG" | sed -e 's/[[:space:]]*$//' -e '/./,$!d')
          fi
          # If still empty, fall back to last commit subject (better than blank).
          if [ -z "$MSG" ]; then
            MSG="See commits since previous release."
          fi
          {
            echo "body<<NOTES_EOF"
            echo "$MSG"
            echo ""
            echo "---"
            echo ""
            echo "### Install"
            echo "Download the \`.exe\` installer below and run it. Requires Node.js 20+ and \`@anthropic-ai/claude-code\` installed globally + logged in."
            echo ""
            echo "Existing installs will auto-update silently via the in-app banner."
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Install sidecar deps (all)
        run: npm ci
        working-directory: ./sidecar

      - name: Build sidecar (tsc)
        run: npm run build
        working-directory: ./sidecar

      - name: Prune sidecar dev deps (after build)
        run: npm prune --omit=dev
        working-directory: ./sidecar

      - name: Build Tauri app + sign updater artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Claude OS ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false

      # latest.json is generated automatically by tauri-action when
      # includeUpdaterJson is true (default). It picks the NSIS installer for
      # Windows, which supports silent updates — no Windows Installer dialog.
